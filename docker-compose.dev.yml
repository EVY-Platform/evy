services:
  postgres:
    image: "postgres:18"
    ports:
      - ${DB_PORT:-5432}:5432
    environment:
      POSTGRES_USER: ${DB_USER:-evy}
      POSTGRES_PASSWORD: ${DB_PASS:-evy}
      POSTGRES_DATABASE: ${DB_DATABASE:-evy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-evy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: api/.
      dockerfile: Dockerfile
    ports:
      - ${API_PORT:-8000}:${API_PORT:-8000}
    environment:
      - DB_URL=postgresql://${DB_USER}:${DB_PASS}@postgres:${DB_PORT}/${DB_DATABASE}
      - ${API_PORT:-8000}=${API_PORT:-8000}
    env_file:
      - api/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules

  web:
    build:
      context: web/.
      dockerfile: Dockerfile
    ports:
      - ${WEB_PORT:-3000}:${WEB_PORT:-3000}
    environment:
      - WEB_PORT=${WEB_PORT:-3000}
    env_file:
      - web/.env
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  postgres_data: