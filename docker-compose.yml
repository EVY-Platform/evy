services:
  postgres:
    image: "postgres:18"
    ports:
      - ${DB_PORT:-5432}:5432
    environment:
      POSTGRES_USER: ${DB_USER:-evy}
      POSTGRES_PASSWORD: ${DB_PASS:-evy}
      POSTGRES_DB: ${DB_DATABASE:-evy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-evy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: runner
    ports:
      - ${API_PORT:-8000}:${API_PORT:-8000}
    environment:
      - DB_URL=postgresql://${DB_USER:-evy}:${DB_PASS:-evy}@postgres:5432/${DB_DATABASE:-evy}
      - API_PORT=${API_PORT:-8000}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runner
    ports:
      - ${WEB_PORT:-3000}:${WEB_PORT:-3000}
    environment:
      - WEB_PORT=${WEB_PORT:-3000}
    depends_on:
      - api

volumes:
  postgres_data:
