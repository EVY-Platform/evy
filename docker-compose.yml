services:
  postgres:
    image: "postgres:18"
    ports:
      - ${DB_PORT}:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data_18:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
      target: runner
    ports:
      - ${API_PORT}:${API_PORT}
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_PORT=5432
      - DB_DOMAIN=postgres
      - DB_DATABASE=${DB_DATABASE}
      - API_PORT=${API_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "run", "health"]
      interval: 500ms
      timeout: 1s
      retries: 10
      start_period: 100ms

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: runner
      args:
        API_URL: ${API_URL}
    ports:
      - ${WEB_PORT}:${WEB_PORT}
    environment:
      - WEB_PORT=${WEB_PORT}
      - API_URL=${API_URL}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data_18:
