services:
  postgres:
    image: "postgres:16"
    ports:
      - ${DB_PORT}:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init-marketplace.sql:/docker-entrypoint-initdb.d/02-marketplace.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  marketplace:
    build:
      context: .
      dockerfile: ./services/marketplace/Dockerfile
      target: runner
    ports:
      - ${MARKETPLACE_GRPC_PORT:-8001}:${MARKETPLACE_GRPC_PORT:-8001}
    environment:
      - MARKETPLACE_GRPC_HOST=${MARKETPLACE_GRPC_HOST:-0.0.0.0}
      - MARKETPLACE_GRPC_PORT=${MARKETPLACE_GRPC_PORT:-8001}
      - MARKETPLACE_DB_DATABASE=${MARKETPLACE_DB_DATABASE:-marketplace}
      - API_PORT=${MARKETPLACE_GRPC_PORT:-8001}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_PORT=5432
      - DB_DOMAIN=postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "run", "health"]
      interval: 500ms
      timeout: 1s
      retries: 10
      start_period: 100ms

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
      target: runner
    ports:
      - ${API_PORT}:${API_PORT}
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_PORT=5432
      - DB_DOMAIN=postgres
      - DB_DATABASE=${DB_DATABASE}
      - API_PORT=${API_PORT}
      - MARKETPLACE_GRPC_HOST=marketplace
      - MARKETPLACE_GRPC_PORT=${MARKETPLACE_GRPC_PORT:-8001}
    depends_on:
      postgres:
        condition: service_healthy
      marketplace:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "run", "health"]
      interval: 500ms
      timeout: 1s
      retries: 10
      start_period: 100ms

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: runner
      args:
        API_URL: ${API_URL}
    ports:
      - ${WEB_PORT}:${WEB_PORT}
    environment:
      - WEB_PORT=${WEB_PORT}
      - API_URL=${API_URL}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
