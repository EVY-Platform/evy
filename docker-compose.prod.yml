services:
  web:
    image: "ghcr.io/glesage/evy-web:latest"
    ports:
      - ${WEB_PORT}:${WEB_PORT}
    environment:
      - WEB_PORT=${WEB_PORT}
      - API_URL=${API_URL}
    labels:
      - traefik.enable=true
      - traefik.port=80
      - traefik.http.routers.web.rule=Host(`web.${DOMAIN}`)
      - traefik.http.routers.web.entrypoints=https
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=${CERT_RESOLVER}
    depends_on:
      - api
  marketplace:
    image: "ghcr.io/glesage/evy-marketplace:latest"
    ports:
      - ${MARKETPLACE_GRPC_PORT}:${MARKETPLACE_GRPC_PORT}
    environment:
      - MARKETPLACE_GRPC_HOST=${MARKETPLACE_GRPC_HOST}
      - MARKETPLACE_GRPC_PORT=${MARKETPLACE_GRPC_PORT}
      - DB_MARKETPLACE_DATABASE=${DB_MARKETPLACE_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_PORT=${DB_PORT}
      - DB_DOMAIN=db
    depends_on:
      db:
        condition: service_healthy
  api:
    image: "ghcr.io/glesage/evy-api:latest"
    ports:
      - ${API_PORT}:${API_PORT}
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_PORT=${DB_PORT}
      - DB_DOMAIN=db
      - DB_EVY_DATABASE=${DB_EVY_DATABASE}
      - API_PORT=${API_PORT}
      - MARKETPLACE_GRPC_HOST=marketplace
      - MARKETPLACE_GRPC_PORT=${MARKETPLACE_GRPC_PORT}
    labels:
      - traefik.enable=true
      - traefik.port=80
      - traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.api.entrypoints=https
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=${CERT_RESOLVER}
    depends_on:
      - db
      - marketplace
  db:
    image: "postgres:16"
    ports:
      - ${DB_PORT}:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_EVY_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 1s
      timeout: 1s
      retries: 3
  traefik:
    image: traefik:v2.10
    command:
      - --entrypoints.http.address=:80
      - --entrypoints.https.address=:443
      - --providers.docker=true
      - --providers.file.filename=/traefik/dynamic.yml
      - --api=true
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=http
      - --certificatesresolvers.le.acme.email=${EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    labels:
      - traefik.enable=true
      - traefik.http.routers.to-https.rule=HostRegexp(`{host:.+}`)
      - traefik.http.routers.to-https.entrypoints=http
      - traefik.http.routers.to-https.middlewares=to-https
      - traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=https
      - traefik.http.routers.traefik.middlewares=auth
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.tls.certresolver=${CERT_RESOLVER}
      - traefik.http.middlewares.to-https.redirectscheme.scheme=https
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_USER}:${TRAEFIK_PASSWORD_HASH}"
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped
    networks:
      - traefik
    volumes:
      - ~/letsencrypt:/letsencrypt
      - ~/traefik/dynamic.yml:/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  whoami:
    image: containous/whoami
    labels:
      - traefik.http.routers.https.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.https.entrypoints=https
      - traefik.http.routers.https.tls=true
      - traefik.http.routers.https.tls.certresolver=${CERT_RESOLVER}
networks:
  traefik:
    external: true
