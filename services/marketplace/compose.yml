name: marketplace

services:
  app:
    build:
      context: ../../
      dockerfile: ./services/marketplace/Dockerfile
      target: runner
    environment:
      - MARKETPLACE_GRPC_PORT=${MARKETPLACE_GRPC_PORT}
      - API_PORT=${MARKETPLACE_GRPC_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_PORT=${DB_PORT}
      - DB_DOMAIN=host.docker.internal
      - MARKETPLACE_DB_DATABASE=${MARKETPLACE_DB_DATABASE:-marketplace}
    env_file:
      - ../../.env
    ports:
      - ${MARKETPLACE_GRPC_PORT}:${MARKETPLACE_GRPC_PORT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
