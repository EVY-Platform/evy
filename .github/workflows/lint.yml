name: lint

on:
    pull_request:
        branches: [dev]
    push:
        branches: [dev]

jobs:
    web:
        defaults:
            run:
                working-directory: web

        timeout-minutes: 1
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Check for web changes
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      web:
                        - 'web/**'

            - name: Setup Bun
              if: steps.filter.outputs.web == 'true'
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              if: steps.filter.outputs.web == 'true'
              run: bun install

            - name: Run lint
              if: steps.filter.outputs.web == 'true'
              run: bun run lint

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always() && steps.filter.outputs.web == 'true'
              with:
                  name: lint-report
                  path: lint-report/
                  retention-days: 1
