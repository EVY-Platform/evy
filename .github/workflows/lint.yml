name: lint

on:
    pull_request:
        branches: [dev]
        paths: "web/**"

jobs:
    web:
        defaults:
            run:
                working-directory: web

        timeout-minutes: 1
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Run lint
              run: bun run lint

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: lint-report
                  path: lint-report/
                  retention-days: 1
