name: API Tests

on:
    pull_request:
        branches: [dev]
    push:
        branches: [dev]

jobs:
    api:
        defaults:
            run:
                working-directory: api

        timeout-minutes: 5
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup environment
              uses: ./.github/actions/setup-bun
              id: setup
              with:
                  working-directory: api
                  path-filter: 'api/**'

            - name: Install root dependencies
              if: steps.setup.outputs.has-changes == 'true'
              run: bun install
              working-directory: .

            - name: Run Tests
              if: steps.setup.outputs.has-changes == 'true'
              run: bun run test
              env:
                  API_PORT: "8000"
                  DB_USER: postgres
                  DB_PASS: postgres
                  DB_PORT: "5432"
                  DB_DOMAIN: localhost
                  DB_DATABASE: test
