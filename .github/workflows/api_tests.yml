name: API Tests

on:
    pull_request:
        branches: [dev]
    push:
        branches: [dev]

jobs:
    api_tests:
        defaults:
            run:
                working-directory: api

        timeout-minutes: 2
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup environment
              uses: ./.github/actions/setup-bun
              id: setup
              with:
                  working-directory: api
                  path-filter: 'api/**'
                  path-filter-extra: 'types/**'

            - name: Install root dependencies
              if: steps.setup.outputs.has-changes == 'true'
              run: bun install
              working-directory: .

            - name: Generate types
              if: steps.setup.outputs.has-changes == 'true'
              run: bun types:generate
              working-directory: .

            - name: Run Tests
              if: steps.setup.outputs.has-changes == 'true'
              run: bun run test
              env:
                  DB_USER: evy
                  DB_PASS: evy
                  DB_PORT: 5432
                  DB_DOMAIN: localhost
                  DB_EVY_DATABASE: test
