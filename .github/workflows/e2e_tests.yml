name: E2E Tests

on:
    pull_request:
        branches: [dev]
        paths:
            - "api/**"
            - "web/**"
            - "ios/**"
            - "types/**"
            - "run-e2e.sh"
            - ".github/workflows/e2e_tests.yml"
    push:
        branches: [dev]
        paths:
            - "api/**"
            - "web/**"
            - "ios/**"
            - "types/**"
            - "run-e2e.sh"
            - ".github/workflows/e2e_tests.yml"
    workflow_dispatch:

# NOTE: iOS e2e tests require macOS 26 (for iOS 26.2 simulator) + Docker.
# GitHub-hosted ARM macOS runners don't support Docker (no nested virtualization).
# iOS tests must be run locally or on a self-hosted runner with Docker Desktop.

jobs:
    e2e_tests:
        timeout-minutes: 2
        runs-on: ubuntu-latest
        container: mcr.microsoft.com/playwright:v1.58.2-noble

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: evy
                    POSTGRES_PASSWORD: evy
                    POSTGRES_DB: evy
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U evy -d evy"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install unzip
              run: apt-get update && apt-get install -y unzip

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install root dependencies
              run: bun install
              working-directory: .

            - name: Install API dependencies
              working-directory: api
              run: bun install

            - name: Install Web dependencies
              working-directory: web
              run: bun install

            - name: Create root .env from example
              run: |
                  cp .env.example .env
                  sed -i 's/^DB_DOMAIN=.*/DB_DOMAIN=postgres/' .env

            - name: Generate types
              run: bun types:generate
              working-directory: .

            - name: Run E2E tests
              run: bash run-e2e.sh --skip-ios --no-docker

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: web/playwright-report/
                  retention-days: 1
