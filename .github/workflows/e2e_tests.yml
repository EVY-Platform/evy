name: E2E Tests

on:
    pull_request:
        branches: [dev]
        paths:
            - "api/**"
            - "web/**"
            - "ios/**"
            - "types/**"
            - "run-e2e.sh"
            - ".github/workflows/e2e_tests.yml"
            - ".github/actions/**"
    push:
        branches: [dev]
        paths:
            - "api/**"
            - "web/**"
            - "ios/**"
            - "types/**"
            - "run-e2e.sh"
            - ".github/workflows/e2e_tests.yml"
            - ".github/actions/**"
    workflow_dispatch:

# NOTE: iOS e2e tests require macOS 26 (for iOS 26.2 simulator) + Docker.
# GitHub-hosted ARM macOS runners don't support Docker (no nested virtualization).
# iOS tests must be run locally or on a self-hosted runner with Docker Desktop.

jobs:
    e2e_tests:
        permissions:
            contents: read
            packages: read
        timeout-minutes: 2
        runs-on: ubuntu-latest
        container: ghcr.io/evy-platform/evy-ci:playwright-1.58.2

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Start PostgreSQL
              run: |
                  pg_ctlcluster 16 main start
                  su - postgres -c "psql -c \"CREATE USER evy WITH PASSWORD 'evy' CREATEDB;\""
                  su - postgres -c "createdb -O evy evy"

            - name: Install root dependencies
              run: bun install
              working-directory: .

            - name: Install API dependencies
              working-directory: api
              run: bun install

            - name: Install Web dependencies
              working-directory: web
              run: bun install

            - name: Prepare .env and generate types
              uses: ./.github/actions/prepare-dotenv-and-types

            - name: Run E2E tests
              run: bash run-e2e.sh --skip-ios --no-docker

            - name: Upload Playwright report
              uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: e2e-tests-playwright-report
                  path: web/playwright-report/
                  retention-days: 1
