name: Types Check

on:
    pull_request:
        branches: [dev]
    push:
        branches: [dev]

jobs:
    types:
        timeout-minutes: 1
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install root dependencies
              run: bun install --frozen-lockfile
              working-directory: .

            - name: Generate types
              run: bun run types:generate

            - name: Check generated types are up to date
              run: bun run types:check
