name: Web Tests

on:
    pull_request:
        branches: [dev]
    push:
        branches: [dev]

jobs:
    web_tests:
        permissions:
            contents: read
            packages: read
        defaults:
            run:
                working-directory: web

        timeout-minutes: 2
        runs-on: ubuntu-latest
        container: ghcr.io/evy-platform/evy-ci:playwright-1.59.1
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup environment
              uses: ./.github/actions/setup-bun
              id: setup
              with:
                  working-directory: web
                  path-filter: 'web/**'
                  path-filter-extra: 'types/**'

            - name: Install root dependencies
              if: steps.setup.outputs.has-changes == 'true'
              run: bun install
              working-directory: .

            - name: Prepare .env and generate types
              if: steps.setup.outputs.has-changes == 'true'
              uses: ./.github/actions/prepare-dotenv-and-types

            - name: Build application
              if: steps.setup.outputs.has-changes == 'true'
              run: bun run build

            - name: Run Tests
              if: steps.setup.outputs.has-changes == 'true'
              run: bun run test

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: always() && steps.setup.outputs.has-changes == 'true'
              with:
                  name: web-tests-playwright-report
                  path: web/playwright-report/
                  retention-days: 1
