name: Create and publish docker images to Github

on:
  push:
    branches: ['main']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@latest
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api Docker image
        uses: docker/build-push-action@latest
        with:
          context: api/
          push: true
          tags: ghcr.io/${{ github.repository }}-api:latest
          labels: ${{ steps.meta.outputs.labels }}
        env:
          API_PORT: ${API_PORT:-8000}
          DB_URL: ${DB_URL}

      - name: Build and push web Docker image
        uses: docker/build-push-action@latest
        with:
          context: web/
          push: true
          tags: ghcr.io/${{ github.repository }}-web:latest
          labels: ${{ steps.meta.outputs.labels }}
        env:
          WEB_PORT: ${WEB_PORT:-3000}

      - name: Docker Compose Remote Deploy api
        uses: glesage/docker-compose-remote-action@latest
        with:
          service: api
          project_name: evy
          ssh_host: 170.64.163.217
          ssh_user: evy
          ssh_key: ${{ secrets.DO_SSH_KEY }}
          known_host_key: ${{ secrets.DO_HOST_KEY }}
          pull: true
        env:
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASS: ${{ secrets.PG_PASS }}
          DB_URL: postgresql://${{ secrets.PG_USER }}:${{ secrets.PG_PASS }}@db:5432/evy

      - name: Docker Compose Remote Deploy web
        uses: glesage/docker-compose-remote-action@latest
        with:
          service: web
          project_name: evy
          ssh_host: 170.64.163.217
          ssh_user: evy
          ssh_key: ${{ secrets.DO_SSH_KEY }}
          known_host_key: ${{ secrets.DO_HOST_KEY }}
          pull: true